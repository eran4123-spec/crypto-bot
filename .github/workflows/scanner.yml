name: Crypto Scanner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache last signal
        uses: actions/cache@v4
        with:
          path: last_signal.json
          key: last-signal-${{ github.run_number }}
          restore-keys: last-signal-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת ספריות
        run: pip install ccxt pandas numpy requests

      - name: הרצת סקנר
        run: python scanner_once.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
